# cargo-deny configuration — supply-chain gate run in CI (see .github/workflows/ci.yml).
# Checks: advisories (RustSec), license allow-list, and duplicate/banned crates.

[advisories]
version = 2
# No ignored advisories: `cargo audit` / `cargo deny check advisories` are clean.

[licenses]
version = 2
# Permissive licenses only. This is the exact set present in the current tree
# (`cargo deny list`); every dependency resolves to one of these.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
# `hashbrown` resolves to 3 versions, ALL transitive through gix's crate family
# (dashmap / clru / gix-hashtable); noteit has zero direct pull and Cargo.toml
# mandates gix default features. Accepted — see docs/BACKLOG.md. `warn` keeps
# this visible without failing CI.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
