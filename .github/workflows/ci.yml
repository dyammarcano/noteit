# CI for github.com/dyammarcano/noteit: fmt + clippy (-D warnings) + tests on
# every push/PR to main/master, plus a cargo-audit dependency scan.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Honors rust-toolchain.toml automatically via rustup; components
      # are still declared explicitly here for clarity/caching.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # No unfixable advisories were found as of H-10's audit run, so this
      # step is blocking. If a future advisory has no available fix, add
      # `continue-on-error: true` here and document the ignored advisory
      # in audit.toml with a rationale.
      - name: cargo audit
        run: cargo audit

      # Supply-chain gate: RustSec advisories + license allow-list + source
      # trust (config in deny.toml). Duplicate versions are `warn` (the
      # accepted transitive hashbrown dup via gix), so this stays blocking.
      - name: cargo deny
        run: cargo deny check

  coverage:
    name: coverage (informational)
    runs-on: ubuntu-latest
    # Non-blocking: llvm-cov does an instrumented rebuild of the bundled
    # SQLite, which is slow; a coverage hiccup must never red the pipeline.
    # The `test` job above is the real gate.
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: cargo llvm-cov --summary-only
        run: cargo llvm-cov --summary-only
